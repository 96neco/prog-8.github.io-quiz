<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>クイズ</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    margin-top:60px;
}

#question{
    font-size:40px;
    margin:30px;
    user-select:none;
    -webkit-user-select:none;
    -moz-user-select:none;
    -ms-user-select:none;
}

input{
    font-size:26px;
    width:300px;
    padding:10px;
}

button{
    font-size:22px;
    padding:10px 20px;
    margin:15px;
}

#result{
    font-size:28px;
    margin-top:20px;
    white-space:pre-line;
    user-select:none;
    -webkit-user-select:none;
    -moz-user-select:none;
    -ms-user-select:none;
}

#score{
    margin-top:20px;
    font-size:20px;
}
</style>

</head>
<body>

<h1>書いてあることをそのまま入力するだけのクイズ</h1>

<div id="question"
     draggable="false"
     ondragstart="return false;"
     oncontextmenu="return false;"
     oncopy="return false;"
     onselectstart="return false;"></div>

<input
    type="text"
    id="answer"
    autocomplete="off"
    autocorrect="off"
    autocapitalize="off"
    spellcheck="false"
    onpaste="return false;"
    ondrop="return false;">

<br>

<button id="judgeBtn" onclick="check()">判定</button>

<button id="nextBtn" onclick="nextQuestion()" style="display:none;">
次へ
</button>

<div id="result"
     oncontextmenu="return false;"
     oncopy="return false;"
     onselectstart="return false;"></div>

<div id="score"></div>

<script>

const questions = [
    {question:"𗀀",answer:"𗀀"},
    {question:"辨",answer:"辨"},
    {question:"陞",answer:"陞"},
    {question:"⌠",answer:"⌠"},
    {question:" ",answer:" "},
    {question:"∮",answer:"∮"},
    {question:"ばなな ",answer:"ばなな "},
    {question:"𝅙",answer:"𝅙"}
];

let used = [];
let current;
let currentIndex;
let correctCount = 0;

nextQuestion();

function nextQuestion(){

    if(used.length === questions.length){

        document.getElementById("question").textContent="終了！";

        document.getElementById("answer").style.display="none";
        document.getElementById("judgeBtn").style.display="none";
        document.getElementById("nextBtn").style.display="none";

        document.getElementById("result").textContent=
            "あなたの得点は\n"+correctCount+" / "+questions.length+" 点です！";

        return;
    }

    do{
        currentIndex=Math.floor(Math.random()*questions.length);
    }while(used.includes(currentIndex));

    used.push(currentIndex);

    current=questions[currentIndex];

    document.getElementById("question").textContent=current.question;
    document.getElementById("answer").value="";
    document.getElementById("result").textContent="";

    document.getElementById("judgeBtn").disabled=false;
    document.getElementById("nextBtn").style.display="none";

    document.getElementById("score").textContent=
        "正解数："+correctCount+" / "+used.length;

    document.getElementById("answer").focus();
}

function check(){

    const input=document.getElementById("answer").value;

    if(input===current.answer){

        correctCount++;

        document.getElementById("result").textContent=
            "⭕ 正解！";

    }else{

        document.getElementById("result").textContent=
            "❌ 不正解\n\n正解は「"+current.answer+"」です。";
    }

    document.getElementById("judgeBtn").disabled=true;
    document.getElementById("nextBtn").style.display="inline-block";

    document.getElementById("score").textContent=
        "正解数："+correctCount+" / "+used.length;
}

document.getElementById("answer").addEventListener("keydown",function(e){

    // Ctrl+V
    if(e.ctrlKey && (e.key==="v" || e.key==="V")){
        e.preventDefault();
        return;
    }

    // Ctrl+Shift+V
    if(e.ctrlKey && e.shiftKey &&
       (e.key==="v" || e.key==="V")){
        e.preventDefault();
        return;
    }

    // Shift+Insert
    if(e.shiftKey && e.key==="Insert"){
        e.preventDefault();
        return;
    }

    // Enterで判定
    if(e.key==="Enter" &&
       !document.getElementById("judgeBtn").disabled){
        check();
    }

});

// ドキュメント全体のコピーを禁止
document.addEventListener("copy", function(e){
    e.preventDefault();
});

// ドラッグ開始を禁止
document.addEventListener("dragstart", function(e){
    e.preventDefault();
});

</script>

</body>
</html>
